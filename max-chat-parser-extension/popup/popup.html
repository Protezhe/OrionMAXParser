<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAX Chat Parser</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>MAX Chat Parser</h1>
      <p class="hint">Откройте чат на web.max.ru и нажмите «Собрать».</p>

      <section class="panel status-panel">
        <span id="status">готово</span>
        <span id="currentTab" class="chat-key"></span>
      </section>

      <section class="buttons">
        <button id="collectBtn">Собрать</button>
      </section>

      <section class="panel">
        <h2>Чат</h2>
        <div class="chat-row">
          <select id="chatSelect">
            <option value="">— загрузка… —</option>
          </select>
          <button id="refreshChatsBtn" class="icon-btn" title="Обновить">↻</button>
        </div>
      </section>

      <section class="panel">
        <h2>Дата</h2>
        <div class="date-row">
          <label>
            <span>С</span>
            <input id="dateStartInput" type="date" />
          </label>
          <label>
            <span>По</span>
            <input id="dateEndInput" type="date" />
          </label>
        </div>
        <div class="date-hint" id="dateHint"></div>
      </section>

      <section class="panel">
        <h2>Промт</h2>
        <textarea id="promptInput" rows="10" placeholder="Вставьте промт..."></textarea>
      </section>

      <section class="panel">
        <h2>Результат</h2>
        <div class="result-toolbar">
          <button id="copyResultBtn" class="primary-btn">Копировать</button>
        </div>
        <textarea id="dateJsonOutput" rows="10" readonly placeholder="Выберите диапазон дат, нажмите «Собрать»..."></textarea>
      </section>

      <details class="panel collapsible">
        <summary>Сохранить чат в файл</summary>
        <div class="collapsible-body">
          <button id="saveChatJsonBtn" class="muted-btn">Сохранить parse.json</button>
        </div>
      </details>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
